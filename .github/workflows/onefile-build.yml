name: onefile-build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run tests
        run: python -m pytest -q

  build-onefile:
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: windows
            artifact_path: dist/windows/pvi.exe
          - os: ubuntu-latest
            target: linux
            artifact_path: dist/linux/pvi
          - os: macos-latest
            target: macos
            artifact_path: dist/macos/pvi

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install bundle dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[bundle]

      - name: Build onefile
        run: python build_onefile.py --target-platform ${{ matrix.target }}

      - name: Smoke test version (Windows)
        if: matrix.target == 'windows'
        shell: pwsh
        run: .\dist\windows\pvi.exe --version

      - name: Smoke test version (POSIX)
        if: matrix.target != 'windows'
        run: |
          chmod +x "${{ matrix.artifact_path }}"
          "${{ matrix.artifact_path }}" --version

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pvi-${{ matrix.target }}-${{ github.ref_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error